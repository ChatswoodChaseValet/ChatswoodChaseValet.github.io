<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1076 574" font-family="Inter, Arial, sans-serif">
  <style>
    .body{fill:#fcfbf9;stroke:#3a3a3a;stroke-width:2.6;stroke-linejoin:round;stroke-linecap:round}
    .ln{fill:none;stroke:#3a3a3a;stroke-width:2.4;stroke-linejoin:round;stroke-linecap:round}
    .thin{fill:none;stroke:#b3aca0;stroke-width:1.6;stroke-linejoin:round;stroke-linecap:round}
    .tyre{fill:#efece6;stroke:#3a3a3a;stroke-width:2.2}
    .lbl{fill:#b3aca0;font-size:15px;letter-spacing:3px;font-weight:600}
    .dash{fill:none;stroke:#d2ccc1;stroke-width:1.6;stroke-dasharray:7 7}
  </style>

  <!-- tyres (drawn first so the body sits over them) -->
  <rect class="tyre" x="262" y="118" width="78" height="24" rx="7"/>
  <rect class="tyre" x="716" y="118" width="78" height="24" rx="7"/>
  <rect class="tyre" x="262" y="432" width="78" height="24" rx="7"/>
  <rect class="tyre" x="716" y="432" width="78" height="24" rx="7"/>

  <!-- side mirrors -->
  <polygon class="body" points="404,134 384,112 371,119 381,134"/>
  <polygon class="body" points="404,440 384,462 371,455 381,440"/>

  <!-- main body (top-down, nose to the left) -->
  <path class="body" d="M300 132 L820 132 C890 132 936 176 936 287 C936 398 890 442 820 442
    L300 442 C200 442 140 399 140 287 C140 175 200 132 300 132 Z"/>

  <!-- bonnet / front -->
  <path class="thin" d="M150 250 C175 222 215 210 262 207 M150 324 C175 352 215 364 262 367"/>

  <!-- windscreen (front of roof) and rear window -->
  <path class="thin" d="M430 170 C400 215 400 359 430 404"/>
  <path class="thin" d="M788 170 C818 215 818 359 788 404"/>

  <!-- roof / glasshouse panel -->
  <rect class="thin" x="436" y="186" width="346" height="202" rx="34"/>

  <!-- door split lines -->
  <path class="thin" d="M540 132 L540 178 M650 132 L650 178 M540 442 L540 396 M650 442 L650 396"/>

  <!-- centre line -->
  <line class="dash" x1="150" y1="287" x2="926" y2="287"/>

  <!-- orientation labels -->
  <text class="lbl" x="74" y="287" text-anchor="middle" transform="rotate(-90 74 287)">FRONT</text>
  <text class="lbl" x="1004" y="287" text-anchor="middle" transform="rotate(90 1004 287)">REAR</text>
</svg>
